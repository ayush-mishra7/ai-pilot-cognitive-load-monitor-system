apiVersion: v1
kind: Secret
metadata:
  name: aipclm-secrets
  namespace: aipclm
  labels:
    app.kubernetes.io/part-of: aipclm
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  SPRING_DATASOURCE_USERNAME: postgres
  SPRING_DATASOURCE_PASSWORD: postgres
  JWT_SECRET: aipclm-super-secret-key-that-is-at-least-32-bytes-long-2026
