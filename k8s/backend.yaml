# ──────────────────────────────────────────────────────
#  Backend (Spring Boot) — Deployment + Service
# ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aipclm
  labels:
    app: backend
    app.kubernetes.io/part-of: aipclm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: aipclm/backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: aipclm-config
            - secretRef:
                name: aipclm-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/test/simulation/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/test/simulation/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: aipclm
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
