apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: {{ .Values.namespace }}
  labels:
    app: ml-service
    app.kubernetes.io/part-of: aipclm
spec:
  replicas: {{ .Values.mlService.replicas }}
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml-service
          image: {{ .Values.mlService.image.repository }}:{{ .Values.mlService.image.tag }}
          imagePullPolicy: {{ .Values.mlService.image.pullPolicy }}
          ports:
            - containerPort: 8001
          resources:
            requests:
              cpu: {{ .Values.mlService.resources.requests.cpu }}
              memory: {{ .Values.mlService.resources.requests.memory }}
            limits:
              cpu: {{ .Values.mlService.resources.limits.cpu | quote }}
              memory: {{ .Values.mlService.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: ml-service
  ports:
    - port: 8001
      targetPort: 8001

---
{{- if .Values.mlService.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ml-service-hpa
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: aipclm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ml-service
  minReplicas: {{ .Values.mlService.hpa.minReplicas }}
  maxReplicas: {{ .Values.mlService.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.mlService.hpa.targetCPUUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.mlService.hpa.targetMemoryUtilization }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
{{- end }}
