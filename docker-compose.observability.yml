# ──────────────────────────────────────────────────────────────
#  AI-PCLM — Observability Stack (Docker Compose Overlay)
# ──────────────────────────────────────────────────────────────
#  Usage:
#    docker compose -f docker-compose.yml -f docker-compose.observability.yml up --build
#
#  Adds:
#    → Prometheus:  http://localhost:9090
#    → Grafana:     http://localhost:3000  (admin / admin)
#    → Jaeger UI:   http://localhost:16686
# ──────────────────────────────────────────────────────────────

services:
  # ── Extend backend with OTel endpoint ──
  backend:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces

  # ── Extend ML service with OTel endpoint ──
  ml-service:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces

  # ── Prometheus ──
  prometheus:
    image: prom/prometheus:v2.53.3
    container_name: aipclm-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    depends_on:
      backend:
        condition: service_started
      ml-service:
        condition: service_started

  # ── Grafana ──
  grafana:
    image: grafana/grafana:11.4.0
    container_name: aipclm-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  # ── Jaeger (All-in-One) ──
  jaeger:
    image: jaegertracing/all-in-one:1.64
    container_name: aipclm-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
