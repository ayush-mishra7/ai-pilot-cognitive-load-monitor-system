spring:
  application:
    name: aipclm-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/aipclm_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: aipclm-super-secret-key-that-is-at-least-32-bytes-long-2026
  expiration-ms: 86400000   # 24 hours

ml:
  service:
    url: http://localhost:8001
    timeout-ms: 5000

# ── Phase 8: Dynamic Weather & ADS-B ──
weather:
  api:
    base-url: https://avwx.rest/api
    key: ""          # Set your AVWX API key for live METAR/TAF. Empty = synthetic mode.
    timeout-ms: 5000

adsb:
  api:
    base-url: https://opensky-network.org/api
    username: ""     # OpenSky username (optional, anonymous access works but rate-limited)
    password: ""
    timeout-ms: 8000

# ── Phase 7: Observability ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: aipclm-backend
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 50ms, 100ms, 250ms, 500ms, 1s
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
