spring:
  application:
    name: aipclm-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/aipclm_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: aipclm-super-secret-key-that-is-at-least-32-bytes-long-2026
  expiration-ms: 86400000   # 24 hours
