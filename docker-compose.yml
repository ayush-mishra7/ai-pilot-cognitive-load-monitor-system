version: '3.8'

services:
  # Isolated PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: aipclm-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aipclm_db
    ports:
      # Map container 5432 to host 5433 to avoid port conflict if user's local Windows Postgres is actively running on 5432
      - "5433:5432"
    volumes:
      - aipclm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aipclm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Python ML Inference Engine
  ml-service:
    build:
      context: ./aipclm-ml-service
      dockerfile: Dockerfile
    container_name: aipclm-ml-service
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Java Spring Boot Core API
  backend:
    build:
      context: ./aipclm-backend
      dockerfile: Dockerfile
    container_name: aipclm-backend
    environment:
      # Overriding YAML defaults to route across internal docker network names
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/aipclm_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      ML_SERVICE_URL: http://ml-service:8001
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_started

  # React + Vite Client (Served via Nginx)
  frontend:
    build:
      context: ./aipclm-frontend
      dockerfile: Dockerfile
    container_name: aipclm-frontend
    ports:
      # Map standard Vite dev port to external Nginx port
      - "5173:80"
    depends_on:
      - backend

volumes:
  aipclm_pgdata:
