# ──────────────────────────────────────────────────────
#  AI-PCLM — Docker Compose (Full Stack)
# ──────────────────────────────────────────────────────
#  docker compose up --build
#  → Frontend:   http://localhost
#  → Backend:    http://localhost:8080
#  → ML Service: http://localhost:8001
#  → PostgreSQL: localhost:5432
# ──────────────────────────────────────────────────────

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: aipclm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aipclm_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aipclm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── ML Service (FastAPI) ──
  ml-service:
    build:
      context: ./aipclm-ml-service
      dockerfile: Dockerfile
    container_name: aipclm-ml
    restart: unless-stopped
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Backend (Spring Boot) ──
  backend:
    build:
      context: ./aipclm-backend
      dockerfile: Dockerfile
    container_name: aipclm-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aipclm_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      ML_SERVICE_URL: http://ml-service:8001
      JWT_SECRET: aipclm-super-secret-key-that-is-at-least-32-bytes-long-2026
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/test/simulation/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ── Frontend (Nginx) ──
  frontend:
    build:
      context: ./aipclm-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: aipclm-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata:
    driver: local
